<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>관리자 - 시험 생성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">🆕 새 시험 문제 등록</h2>
        <div class="card p-4 shadow-sm">
            <form action="/admin/save" method="post">
                <div class="mb-3">
                    <label class="form-label">문제 제목</label>
                    <input type="text" name="title" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">문제 내용</label>
                    <textarea name="description" class="form-control" rows="10"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success w-100">시험 만들기</button>
                    <a href="/exams" class="btn btn-outline-secondary w-100">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
